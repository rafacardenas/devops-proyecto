name: DevOps Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v3

      - name: Construir imagen Docker
        run: docker build -t devops-app .

      - name: Ejecutar contenedor
        run: docker run -d -p 80:80 devops-app
        